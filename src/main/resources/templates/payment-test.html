<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포인트 충전 테스트</title>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 4px; white-space: pre-wrap; }
    </style>
</head>
<body>

<h2>💰 포인트 충전 테스2트</h2>

<label>유저 ID</label>
<input type="number" id="userId" value="1" />

<label>충전 금액 (원)</label>
<input type="number" id="amount" value="10000" />

<button onclick="requestPayment()">결제하기</button>

<div id="result">결제 결과가 여기 표시됩니다.</div>

<script>
    const STORE_ID = "store-1836a4dd-b03c-477b-ae19-2934272fa295";
    const CHANNEL_KEY = "channel-key-34f20527-b7a9-4076-96eb-731df19c3966";

    async function requestPayment() {
        const userId = document.getElementById("userId").value;
        const amount = parseInt(document.getElementById("amount").value);
        const paymentId = `payment-${Date.now()}`; // 고유한 결제 ID 생성

        document.getElementById("result").textContent = "결제 진행 중...";

        try {
            // PortOne 결제창 호출
            const response = await PortOne.requestPayment({
                storeId: STORE_ID,
                channelKey: CHANNEL_KEY,
                paymentId: paymentId,
                orderName: "포인트 충전",
                totalAmount: amount,
                currency: "KRW",
                payMethod: "CARD",
                customer: {
                    email: "test@test.com",
                    fullName: "테스트유저",
                    phoneNumber: "01012345678"
                }
            });

            if (response.code) {
                // 결제 실패
                document.getElementById("result").textContent =
                    "결제 실패: " + response.message;
                return;
            }

            // 결제 완료 -> 서버 API 호출
            document.getElementById("result").textContent = "서버 검증 중...";

            const serverResponse = await fetch(`/api/payments/charge/${userId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    paymentId: response.paymentId,
                    amount: amount
                })
            });

            const result = await serverResponse.json();
            document.getElementById("result").textContent =
                JSON.stringify(result, null, 2);

        } catch (error) {
            document.getElementById("result").textContent =
                "오류 발생: " + error.message;
        }
    }
</script>

</body>
</html>
